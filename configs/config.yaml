data:
  csv_path: data/music_sentiment_dataset.csv

features:
  drop_columns:
    - track_id

model:
  type: multimodal
  hidden_dims: [128, 64]
  cnn_channels: [16, 32, 64]
  classifier_hidden_dim: 128
  fusion_embedding_dim: 128
  fusion_hidden_dim: 128
  dropout: 0.2

audio:
  feature_type: mfcc
  audio_path_column: audio_path
  base_dir: data
  sample_rate: 22050
  n_mfcc: 40
  n_mels: 128
  max_frames: 128

training:
  batch_size: 64
  lr: 0.001
  epochs: 20
  device: cuda
  val_size: 0.2
  random_state: 42
  checkpoint_path: artifacts/best_{model_type}.pt
